networks:
  rabbitmq-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

services:
  rabbitmq-1:
    image: rabbitmq:3.12-management
    hostname: rabbitmq-1
    networks:
      rabbitmq-net:
        ipv4_address: 10.10.0.11
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
      RABBITMQ_ERLANG_COOKIE: "LEARNINGCLUSTERCOOKIE"
    entrypoint: >
      bash -c "
        echo 'LEARNINGCLUSTERCOOKIE' > /var/lib/rabbitmq/.erlang.cookie &&
        chmod 400 /var/lib/rabbitmq/.erlang.cookie &&
        chown rabbitmq:rabbitmq /var/lib/rabbitmq/.erlang.cookie &&
        exec docker-entrypoint.sh rabbitmq-server
      "
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-1-data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf

  rabbitmq-2:
    image: rabbitmq:3.12-management
    hostname: rabbitmq-2
    networks:
      rabbitmq-net:
        ipv4_address: 10.10.0.12
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
      RABBITMQ_ERLANG_COOKIE: "LEARNINGCLUSTERCOOKIE"
    entrypoint: >
      bash -c "
        echo 'LEARNINGCLUSTERCOOKIE' > /var/lib/rabbitmq/.erlang.cookie &&
        chmod 400 /var/lib/rabbitmq/.erlang.cookie &&
        chown rabbitmq:rabbitmq /var/lib/rabbitmq/.erlang.cookie &&
        exec docker-entrypoint.sh rabbitmq-server
      "
    volumes:
      - rabbitmq-2-data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf

  rabbitmq-3:
    image: rabbitmq:3.12-management
    hostname: rabbitmq-3
    networks:
      rabbitmq-net:
        ipv4_address: 10.10.0.13
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
      RABBITMQ_ERLANG_COOKIE: "LEARNINGCLUSTERCOOKIE"
    entrypoint: >
      bash -c "
        echo 'LEARNINGCLUSTERCOOKIE' > /var/lib/rabbitmq/.erlang.cookie &&
        chmod 400 /var/lib/rabbitmq/.erlang.cookie &&
        chown rabbitmq:rabbitmq /var/lib/rabbitmq/.erlang.cookie &&
        exec docker-entrypoint.sh rabbitmq-server
      "
    volumes:
      - rabbitmq-3-data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf

  rabbitmq_setup:
    image: rabbitmq:3.12-management
    hostname: rabbitmq-setup
    networks:
      rabbitmq-net:
        ipv4_address: 10.10.0.14
    environment:
      RABBITMQ_ERLANG_COOKIE: "LEARNINGCLUSTERCOOKIE"
    entrypoint: >
      bash -c "
        echo 'LEARNINGCLUSTERCOOKIE' > /var/lib/rabbitmq/.erlang.cookie &&
        chmod 400 /var/lib/rabbitmq/.erlang.cookie &&
        chown rabbitmq:rabbitmq /var/lib/rabbitmq/.erlang.cookie &&
        echo 'Waiting for nodes to start...' &&
        sleep 45 &&
        rabbitmqctl -n rabbit@rabbitmq-2 stop_app &&
        rabbitmqctl -n rabbit@rabbitmq-2 reset &&
        rabbitmqctl -n rabbit@rabbitmq-2 join_cluster rabbit@rabbitmq-1 &&
        rabbitmqctl -n rabbit@rabbitmq-2 start_app &&
        echo 'Node 2 joined' &&
        rabbitmqctl -n rabbit@rabbitmq-3 stop_app &&
        rabbitmqctl -n rabbit@rabbitmq-3 reset &&
        rabbitmqctl -n rabbit@rabbitmq-3 join_cluster rabbit@rabbitmq-1 &&
        rabbitmqctl -n rabbit@rabbitmq-3 start_app &&
        echo 'Node 3 joined' &&
        rabbitmqctl -n rabbit@rabbitmq-1 set_policy ha-all '.*' '{\"ha-mode\":\"all\"}' &&
        echo 'HA policy applied. Cluster ready.'
      "
    depends_on:
      - rabbitmq-1
      - rabbitmq-2
      - rabbitmq-3

volumes:
  rabbitmq-1-data:
  rabbitmq-2-data:
  rabbitmq-3-data: