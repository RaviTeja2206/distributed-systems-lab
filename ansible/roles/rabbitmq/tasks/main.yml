---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Erlang and RabbitMQ from Ubuntu repos
  apt:
    name:
      - erlang
      - rabbitmq-server
    state: present

- name: Write Erlang cookie
  copy:
    content: "{{ rabbitmq_erlang_cookie }}"
    dest: /var/lib/rabbitmq/.erlang.cookie
    owner: rabbitmq
    group: rabbitmq
    mode: '0400'
  notify: restart rabbitmq

- name: Deploy RabbitMQ config
  template:
    src: rabbitmq.conf.j2
    dest: /etc/rabbitmq/rabbitmq.conf
    owner: rabbitmq
    group: rabbitmq
    mode: '0644'
  notify: restart rabbitmq

- name: Ensure RabbitMQ is started and enabled
  service:
    name: rabbitmq-server
    state: started
    enabled: yes

- name: Enable management plugin
  rabbitmq_plugin:
    names: rabbitmq_management
    state: enabled
  notify: restart rabbitmq

- name: Flush handlers
  meta: flush_handlers

- name: Wait for RabbitMQ port to be ready
  wait_for:
    port: 5672
    host: 127.0.0.1
    timeout: 60

- name: Create admin user
  rabbitmq_user:
    user: "{{ rabbitmq_user }}"
    password: "{{ rabbitmq_password }}"
    vhost: /
    configure_priv: .*
    read_priv: .*
    write_priv: .*
    tags: administrator
    state: present

- name: Remove default guest user
  rabbitmq_user:
    user: guest
    state: absent
  ignore_errors: yes

- name: Stop RabbitMQ app for cluster join
  command: rabbitmqctl stop_app
  when: inventory_hostname != 'node-1'

- name: Reset node for clean cluster join
  command: rabbitmqctl reset
  when: inventory_hostname != 'node-1'

- name: Join cluster on node-1
  command: rabbitmqctl join_cluster rabbit@node-1
  when: inventory_hostname != 'node-1'

- name: Start RabbitMQ app after cluster join
  command: rabbitmqctl start_app
  when: inventory_hostname != 'node-1'

- name: Apply HA all-nodes policy
  command: >
    rabbitmqctl set_policy ha-all '.*'
    '{"ha-mode":"all"}'
    --priority 0
    --apply-to all
  when: inventory_hostname == 'node-1'
  run_once: true
